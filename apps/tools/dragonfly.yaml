# Dragonfly — Wave 4: Redis-compatible in-memory data store.
# Operator-based install. Much lighter than Redis + Sentinel.
# Add a Dragonfly CR under clusters/colima/overlays/ to spin up instances.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dragonfly-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/dragonflydb/dragonfly-operator.git'
    targetRevision: 'v1.1.2'
    path: 'config/default'
    kustomize:
      images:
        - 'gcr.io/kubebuilder/kube-rbac-proxy=quay.io/brancz/kube-rbac-proxy:v0.18.2'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dragonfly-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
