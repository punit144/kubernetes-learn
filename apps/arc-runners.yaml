# arc-runners.yaml — ArgoCD Application for GitHub Actions Runner Controller (ARC) scale sets.
# Wave 5: deploys after infrastructure but before demo apps.
# Runners are auto-registered to punit144/kubernetes-learn repository.
# GitHub token must be manually created as a secret (not committed to git).
#
# ╔════════════════════════════════════════════════════════════════╗
# ║ ENABLE/DISABLE SWITCH                                          ║
# ║ Set ENABLED to control automatic deployment and pruning       ║
# ║ ENABLED=true  → auto-deploy and sync                          ║
# ║ ENABLED=false → no auto-deploy, resources pruned on sync      ║
# ║                                                                ║
# ║ Toggle command:                                               ║
# ║ kubectl patch application arc-runners -n argocd --type merge \ ║
# ║  -p '{"spec":{"syncPolicy":{"automated":{"prune":true,   ║
# ║  "selfHeal":ENABLED}}}}'                                     ║
# ╚════════════════════════════════════════════════════════════════╝
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    # Set to 'true' to enable auto-deployment
    app.enabled: "false"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/actions/actions-runner-controller.git
    targetRevision: master
    path: charts/gha-runner-scale-set
    helm:
      releaseName: kubernetes-learn-runners
      values: |
        githubConfigUrl: https://github.com/punit144/kubernetes-learn
        githubConfigSecret: github-token
        minRunners: 1
        maxRunners: 3
        runnerGroup: default
        controllerServiceAccount:
          namespace: gha-runner-system
          name: arc-controller-gha-rs-controller
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command:
                  - /home/runner/run.sh
                env:
                  - name: RUNNER_ALLOW_RUNASROOT
                    value: "true"
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: github-actions
  # Disabled to free resources for Consul
  # To enable: uncomment syncPolicy and run: kubectl patch application arc-runners -n argocd --type merge -p '{\"spec\":{\"syncPolicy\":{\"automated\":{\"prune\":true,\"selfHeal\":true}}}}'\n  syncPolicy:\n    # automated:\n    #   prune: true\n    #   selfHeal: true\n    syncOptions:\n      - CreateNamespace=true\n      - ServerSideApply=true
