apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: consul

namespace: consul

# Enable Helm chart support
helmCharts:
  - name: consul
    repo: https://helm.releases.hashicorp.com
    version: 1.4.8
    namespace: consul
    valuesFile: values.yaml
    releaseName: consul
