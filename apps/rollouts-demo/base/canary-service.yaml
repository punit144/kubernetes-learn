# Canary Services — Canary traffic targets newly promoted subset; stable targets current prod.
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-canary-canary
  namespace: rollouts-demo
  labels:
    app: rollouts-demo-canary
spec:
  type: ClusterIP
  selector:
    app: rollouts-demo-canary
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 8888
    targetPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo-canary-stable
  namespace: rollouts-demo
  labels:
    app: rollouts-demo-canary
spec:
  type: ClusterIP
  selector:
    app: rollouts-demo-canary
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 8888
    targetPort: 8888
