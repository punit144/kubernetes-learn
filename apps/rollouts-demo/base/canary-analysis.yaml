# AnalysisTemplate for Canary — Success rate checks before proceeding to next weight step.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: rollouts-demo
spec:
  metrics:
  - name: success-rate
    interval: 30s
    successCondition: result[0] > 0.95
    failureCondition: result[0] <= 0.80
    failureLimit: 2
    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring:9090
        query: |
          sum(rate(http_requests_total{job="rollouts-demo-canary",status=~"2.."}[2m])) /
          sum(rate(http_requests_total{job="rollouts-demo-canary"}[2m]))
