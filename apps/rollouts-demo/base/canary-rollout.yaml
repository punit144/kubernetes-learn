# Canary Rollout — Progressive traffic shift (0% → 50% → 100%) to new version.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo-canary
  namespace: rollouts-demo
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: rollouts-demo-canary
      app.kubernetes.io/part-of: rollouts-demo
  template:
    metadata:
      labels:
        app: rollouts-demo-canary
        app.kubernetes.io/part-of: rollouts-demo
    spec:
      initContainers:
      - name: wait-for-dragonfly
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          until redis-cli -h "${DRAGONFLY_HOST}" -p "${DRAGONFLY_PORT}" ping; do
            echo "waiting for dragonfly";
            sleep 2;
          done
        env:
        - name: DRAGONFLY_HOST
          value: rollouts-dragonfly
        - name: DRAGONFLY_PORT
          value: "6379"
      containers:
      - name: rollouts-demo
        image: argoproj/rollouts-demo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8888
          name: metrics
        env:
        - name: PORT
          value: "8080"
        - name: DRAGONFLY_HOST
          value: rollouts-dragonfly
        - name: DRAGONFLY_PORT
          value: "6379"
        - name: DRAGONFLY_URL
          value: redis://rollouts-dragonfly:6379
        - name: STATE_STORE
          value: dragonfly
        - name: DRAGONFLY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rollouts-dragonfly-auth
              key: password
              optional: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
  strategy:
    canary:
      steps:
      - setWeight: 0
      - pause: {}
      - setWeight: 25
      - pause:
          duration: 5m
      - setWeight: 50
      - pause:
          duration: 5m
      - setWeight: 75
      - pause:
          duration: 5m
      canaryService: rollouts-demo-canary-canary
      stableService: rollouts-demo-canary-stable
      trafficRouting:
        istio:
          virtualServices:
          - name: rollouts-demo-canary-vs
