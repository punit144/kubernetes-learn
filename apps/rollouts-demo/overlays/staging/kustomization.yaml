apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rollouts-demo-staging
resources:
  - ../../base
  - namespace.yaml
  - dragonfly-auth-secret.yaml
patches:
  - target:
      group: dragonflydb.io
      version: v1alpha1
      kind: Dragonfly
      name: rollouts-dragonfly
    patch: |-
      - op: add
        path: /spec/authentication
        value:
          passwordFromSecret:
            name: rollouts-dragonfly-auth
            key: password
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/resources
        value:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
      - op: replace
        path: /spec/snapshot/persistentVolumeClaimSpec/resources/requests/storage
        value: 10Gi
      - op: add
        path: /spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: rollouts-dragonfly
  - target:
      group: ""
      version: v1
      kind: Service
      name: rollouts-demo-canary-nodeport
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: remove
        path: /spec/ports/0/nodePort
  - target:
      group: ""
      version: v1
      kind: Service
      name: rollouts-demo-blue-green-nodeport
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: remove
        path: /spec/ports/0/nodePort
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: rollouts-demo-canary
    patch: |-
      - op: remove
        path: /spec/strategy/canary/trafficRouting
