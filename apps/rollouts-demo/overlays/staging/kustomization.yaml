apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rollouts-demo-staging
resources:
  - ../../base
  - namespace.yaml
  - dragonfly-auth-secret.yaml
patches:
  - target:
      group: dragonflydb.io
      version: v1alpha1
      kind: Dragonfly
      name: rollouts-dragonfly
    patch: |-
      - op: add
        path: /spec/authentication
        value:
          passwordFromSecret:
            name: rollouts-dragonfly-auth
            key: password
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
      - op: replace
        path: /spec/snapshot/persistentVolumeClaimSpec/resources/requests/storage
        value: 10Gi
      - op: add
        path: /spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: rollouts-dragonfly
