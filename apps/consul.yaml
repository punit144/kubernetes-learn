apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: consul
    targetRevision: 1.4.8
    helm:
      releaseName: consul
      values: |
        global:
          enabled: false
        server:
          enabled: true
          replicas: 1
          storage: 5Gi
          connect: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          disruptionBudget:
            enabled: false
        ui:
          enabled: true
          service:
            type: ClusterIP
        connectInject:
          enabled: false
        webhookCertManager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: consul
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true  # Required: allows ArgoCD to delete+recreate StatefulSets with immutable field changes
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
