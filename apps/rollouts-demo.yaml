# rollouts-demo.yaml — ArgoCD Application for Argo Rollouts canary and blue-green demos.
# Wave 7: deploys after infrastructure (waves 0-3) and local-ui (wave 6).
# Demonstrates progressive delivery with Prometheus metrics integration and Istio traffic routing.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rollouts-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/punit144/kubernetes-learn.git
    targetRevision: main
    path: apps/rollouts-demo/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: rollouts-demo
  # Disabled to free resources for Consul
  # To enable: uncomment syncPolicy and run: kubectl patch application rollouts-demo -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
  syncPolicy:
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
