# Istio Gateway for all local UIs with HTTPS + HTTP→HTTPS redirect
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: local-ui-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    # HTTPS server with TLS termination
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: localhost-tls-secret
      hosts:
        - "argocd.localhost"
        - "grafana.localhost"
        - "prometheus.localhost"
    # HTTP server for redirect to HTTPS
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "argocd.localhost"
        - "grafana.localhost"
        - "prometheus.localhost"
---
# VirtualService: ArgoCD with HTTP→HTTPS redirect
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd-ui
  namespace: argocd
spec:
  hosts:
    - "argocd.localhost"
  gateways:
    - istio-system/local-ui-gateway
  http:
    # HTTP redirect to HTTPS on first match
    - match:
        - uri:
            prefix: "/"
      redirect:
        uri: "/"
        scheme: https
        port: 443
---
# VirtualService: Grafana with HTTP→HTTPS redirect
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-ui
  namespace: monitoring
spec:
  hosts:
    - "grafana.localhost"
  gateways:
    - istio-system/local-ui-gateway
  http:
    # HTTP redirect to HTTPS
    - match:
        - uri:
            prefix: "/"
      redirect:
        uri: "/"
        scheme: https
        port: 443
---
# VirtualService: Prometheus with HTTP→HTTPS redirect
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-ui
  namespace: monitoring
spec:
  hosts:
    - "prometheus.localhost"
  gateways:
    - istio-system/local-ui-gateway
  http:
    # HTTP redirect to HTTPS
    - match:
        - uri:
            prefix: "/"
      redirect:
        uri: "/"
        scheme: https
        port: 443
