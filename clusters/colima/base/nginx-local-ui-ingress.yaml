# Simple nginx ingress for local HTTPS + HTTP redirect
# This is more reliable for local development than complex Istio routing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-ui-ingress
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-ui-ingress
  template:
    metadata:
      labels:
        app: local-ui-ingress
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: tls-secret
          mountPath: /etc/nginx/tls
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-local-ui-config
      - name: tls-secret
        secret:
          secretName: localhost-tls-secret
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: local-ui-ingress
  namespace: default
spec:
  type: NodePort
  selector:
    app: local-ui-ingress
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31080
    name: http
  - port: 443
    targetPort: 443
    nodePort: 31443
    name: https
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-local-ui-config
  namespace: default
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
      worker_connections 1024;
    }
    
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      
      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
      
      access_log /var/log/nginx/access.log main;
      sendfile on;
      tcp_nopush on;
      keepalive_timeout 65;
      gzip on;
      
      # ArgoCD backend
      upstream argocd {
        server argocd-server.argocd.svc.cluster.local:443;
      }
      
      # Grafana backend
      upstream grafana {
        server kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80;
      }
      
      # Prometheus backend
      upstream prometheus {
        server kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090;
      }
      
      # HTTP→HTTPS redirect for all hosts
      server {
        listen 80;
        server_name argocd.localhost grafana.localhost prometheus.localhost;
        return 301 https://$server_name$request_uri;
      }
      
      # HTTPS servers
      server {
        listen 443 ssl;
        server_name argocd.localhost;
        
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        location / {
          proxy_pass https://argocd;
          proxy_set_header Host argocd-server.argocd.svc.cluster.local;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_ssl_verify off;
        }
      }
      
      server {
        listen 443 ssl;
        server_name grafana.localhost;
        
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        location / {
          proxy_pass http://grafana;
          proxy_set_header Host kube-prometheus-stack-grafana.monitoring.svc.cluster.local;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }
      }
      
      server {
        listen 443 ssl;
        server_name prometheus.localhost;
        
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        location / {
          proxy_pass http://prometheus;
          proxy_set_header Host kube-prometheus-stack-prometheus.monitoring.svc.cluster.local;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }
      }
    }
