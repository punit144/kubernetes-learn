apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ui-prod-tls
  namespace: default
spec:
  secretName: local-ui-prod-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argocd.example.com
    - grafana.example.com
    - prometheus.example.com
