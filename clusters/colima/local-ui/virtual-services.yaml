---
# VirtualService for Rollouts Demo — Canary
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: rollouts-demo-canary-vs
  namespace: rollouts-demo
spec:
  hosts:
  - "rollouts-demo-canary.localhost"
  gateways:
  - istio-system/local-ui-gateway
  http:
  - name: primary
    route:
    - destination:
        host: rollouts-demo-canary-stable.rollouts-demo.svc.cluster.local
        port:
          number: 8080
      weight: 100
    - destination:
        host: rollouts-demo-canary-canary.rollouts-demo.svc.cluster.local
        port:
          number: 8080
      weight: 0
    timeout: 30s
---
# VirtualService for Rollouts Demo — Blue-Green
