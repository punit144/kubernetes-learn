---
# VirtualService for ArgoCD
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd-server-vs
  namespace: argocd
spec:
  hosts:
  - "argocd.localhost"
  gateways:
  - istio-system/local-ui-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/stream/
    route:
    - destination:
        host: argocd-server.argocd.svc.cluster.local
        port:
          number: 80
      weight: 100
    timeout: 24h
  - route:
    - destination:
        host: argocd-server.argocd.svc.cluster.local
        port:
          number: 80
      weight: 100
    timeout: 30s
---
