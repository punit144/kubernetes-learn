apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay: local Colima development environment.
# Patch this file to override image tags, replica counts, or resource limits
# for local development without touching the base manifests.
bases:
  - ../../base

resources:
  - github-actions-namespace.yaml
  - arc-runners.yaml
  - arc-networkpolicy.yaml

