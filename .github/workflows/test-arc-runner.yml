name: Test ARC Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/test-arc-runner.yml

jobs:
  runner-smoke-test:
    name: ARC Runner Smoke Test
    runs-on:
      - self-hosted
      - kubernetes-learn-runners
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print runner context
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner os: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          uname -a

      - name: Basic execution test
        run: |
          echo "ARC runner pipeline test started at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          ls -la

      - name: Create and verify artifact
        run: |
          mkdir -p out
          echo "arc-runner-ok" > out/result.txt
          cat out/result.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-runner-smoke-artifact
          path: out/result.txt
